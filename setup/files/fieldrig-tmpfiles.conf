# FieldRig writes its logs to /var/log/fieldrig. Under the read-only root,
# /var/log is a fresh tmpfs every boot (owned by root), so the unprivileged
# app user can't create its log dir. This recreates it — owned by the app
# user — at boot, after the tmpfs is mounted. %USER% is substituted by
# setup/01-system.sh.
d /var/log/fieldrig 0755 %USER% %USER% -
